<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor vial</title>
<style>
  :root {
    --ink: #17202a;
    --muted: #5f6f7a;
    --line: #d7dee2;
    --good: #1b8a5a;
    --blue: #2563a8;
    --bad: #be3a34;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    font-family: Inter, "Segoe UI", Arial, sans-serif;
    background: #edf3ef;
  }

  main {
    display: grid;
    grid-template-columns: minmax(280px, 340px) 1fr;
    gap: 16px;
    max-width: 1180px;
    margin: 0 auto;
    padding: 18px;
  }

  .panel {
    background: rgba(255, 255, 255, 0.95);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 12px 28px rgba(26, 37, 45, 0.12);
  }

  .tools {
    padding: 16px;
  }

  h1 {
    margin: 0 0 6px;
    font-size: 24px;
  }

  p {
    color: var(--muted);
    line-height: 1.45;
  }

  .segmented,
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 14px 0;
  }

  button,
  label.file-button {
    min-height: 38px;
    padding: 0 12px;
    border: 1px solid var(--line);
    border-radius: 7px;
    color: var(--ink);
    background: #fff;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
  }

  button.active {
    color: #fff;
    border-color: #1b6a50;
    background: var(--good);
  }

  button.primary {
    color: #fff;
    border-color: #1d4f87;
    background: var(--blue);
  }

  button.danger {
    color: #fff;
    border-color: #982822;
    background: var(--bad);
  }

  input[type="range"] {
    width: 100%;
  }

  textarea {
    width: 100%;
    min-height: 120px;
    resize: vertical;
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 10px;
    font: 12px Consolas, monospace;
  }

  .stage {
    min-height: calc(100vh - 36px);
    display: grid;
    place-items: center;
    padding: 12px;
  }

  svg {
    width: min(100%, 760px);
    aspect-ratio: 1;
    border-radius: 8px;
    background: #cfd9ca;
    touch-action: manipulation;
  }

  .grid-line { stroke: rgba(23, 32, 42, 0.16); stroke-width: 0.8; }
  .green-zone { fill: #68bf76; opacity: 0.78; stroke: #2f7d45; stroke-width: 1.2; }
  .road { stroke: #050607; stroke-width: 6.6; stroke-linecap: round; }
  .lane { stroke: #f4d35e; stroke-width: 0.55; stroke-linecap: round; pointer-events: none; }
  .zebra-stripe { fill: #f4f7f7; pointer-events: none; }
  .point { fill: #fff; stroke: #17202a; stroke-width: 1.4; cursor: pointer; }
  .point.selected { fill: #f4d35e; stroke-width: 2.2; }
  .zebra-hit { fill: rgba(37,99,168,.16); stroke: #2563a8; stroke-width: 1; cursor: pointer; }
  .zebra-hit.selected { stroke: #f4d35e; stroke-width: 1.8; }
  .zebra-slot { fill: rgba(255,255,255,.04); stroke: rgba(37,99,168,.32); stroke-width: .7; stroke-dasharray: 1.2 1.2; cursor: pointer; }
  .land-cell { stroke: rgba(23,32,42,.16); stroke-width: .45; cursor: pointer; }
  .land-building { fill: rgba(120, 148, 160, .55); }
  .land-tree { fill: rgba(27, 138, 90, .48); }
  .land-empty { fill: rgba(255, 255, 255, .28); }

  .status {
    min-height: 36px;
    padding: 9px 10px;
    border-radius: 7px;
    background: #eef3f4;
    color: var(--muted);
    font-size: 13px;
  }

  @media (max-width: 820px) {
    main { grid-template-columns: 1fr; }
    .stage { min-height: auto; }
  }
</style>
</head>
<body>
<main>
  <section class="panel tools">
    <h1>Editor vial</h1>
    <p>Une puntos de la grilla 5x5 para definir calles. En modo cebras, haz clic en una aproximación de calle para agregar o quitar una zebra peatonal.</p>

    <div class="segmented">
      <button id="mode-road" class="active" type="button">Calles</button>
      <button id="mode-zebra" type="button">Zebras</button>
      <button id="mode-land" type="button">Terreno</button>
    </div>

    <div class="segmented" aria-label="Tipo de terreno">
      <button id="land-building" class="active" type="button">Edificio</button>
      <button id="land-tree" type="button">Árboles</button>
      <button id="land-empty" type="button">Vacío</button>
    </div>

    <label for="zebra-length"><strong>Longitud de líneas blancas</strong>: <span id="zebra-length-value">5.4</span></label>
    <input id="zebra-length" type="range" min="1.5" max="14" step="0.1">

    <div class="actions">
      <button id="btn-save" class="primary" type="button">Guardar en simulación</button>
      <button id="btn-export" type="button">Exportar JSON</button>
      <button id="btn-default" type="button">Grilla completa</button>
      <button id="btn-clear" class="danger" type="button">Limpiar</button>
    </div>

    <textarea id="json-box" aria-label="JSON del layout"></textarea>
    <div class="actions">
      <button id="btn-import" type="button">Importar desde texto</button>
      <label class="file-button" for="file-import">Importar archivo</label>
      <input id="file-import" type="file" accept="application/json,.json" hidden>
    </div>

    <div id="status" class="status">Selecciona dos puntos alineados para crear o quitar una calle.</div>
  </section>

  <section class="panel stage">
    <svg id="editor" viewBox="-70 -70 140 140" role="img" aria-label="Editor de grilla vial"></svg>
  </section>
</main>

<script>
const ROAD_LAYOUT_KEY = "simuladorAireRoadLayout";
const GRID_X = [-48, -24, 0, 24, 48];
const GRID_Z = [-44, -20, 4, 28, 52];
const GREEN_ZONE = { x: -36, z: 40, width: 38.8, depth: 18.8 };
const ROAD_WIDTH = 6.6;
const LAND_USE_COLS = 12;
const LAND_USE_ROWS = 12;
const LAND_USE_MIN = -60;
const LAND_USE_CELL = 10;
const CROSSWALK_DIRECTIONS = [
  { name: "north", dc: 0, dr: 1 },
  { name: "south", dc: 0, dr: -1 },
  { name: "east", dc: 1, dr: 0 },
  { name: "west", dc: -1, dr: 0 }
];
const CROSSWALK_OFFSET = 6.1;
const svg = document.getElementById("editor");
const statusEl = document.getElementById("status");
const jsonBox = document.getElementById("json-box");
const lengthInput = document.getElementById("zebra-length");
const lengthValue = document.getElementById("zebra-length-value");

let mode = "road";
let landBrush = "building";
let selectedPoint = null;
let selectedZebra = null;
let layout = loadLayout();

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function defaultEdges() {
  const edges = [];
  GRID_Z.forEach((_, row) => {
    for (let col = 0; col < GRID_X.length - 1; col++) edges.push({ a: { col, row }, b: { col: col + 1, row } });
  });
  GRID_X.forEach((_, col) => {
    for (let row = 0; row < GRID_Z.length - 1; row++) edges.push({ a: { col, row }, b: { col, row: row + 1 } });
  });
  return edges;
}

function defaultZebras() {
  return [1, 2, 3].flatMap(col => [1, 2, 3].map(row => ({ col, row })));
}

function isInGreenZone(x, z, padding = 0) {
  return Math.abs(x - GREEN_ZONE.x) <= GREEN_ZONE.width / 2 + padding &&
    Math.abs(z - GREEN_ZONE.z) <= GREEN_ZONE.depth / 2 + padding;
}

function defaultLandUse() {
  const cells = [];
  for (let col = 0; col < LAND_USE_COLS; col++) {
    for (let row = 0; row < LAND_USE_ROWS; row++) {
      const x = LAND_USE_MIN + LAND_USE_CELL / 2 + col * LAND_USE_CELL;
      const z = LAND_USE_MIN + LAND_USE_CELL / 2 + row * LAND_USE_CELL;
      cells.push({ col, row, type: isInGreenZone(x, z, 1) ? "tree" : "building" });
    }
  }
  return cells;
}

function normalizeEdge(edge) {
  const a = {
    col: clamp(Math.round(edge.a?.col ?? 0), 0, GRID_X.length - 1),
    row: clamp(Math.round(edge.a?.row ?? 0), 0, GRID_Z.length - 1)
  };
  const b = {
    col: clamp(Math.round(edge.b?.col ?? 0), 0, GRID_X.length - 1),
    row: clamp(Math.round(edge.b?.row ?? 0), 0, GRID_Z.length - 1)
  };
  if (a.col !== b.col && a.row !== b.row) return null;
  if (a.col === b.col && a.row === b.row) return null;
  if (a.col > b.col || a.row > b.row) return { a: b, b: a };
  return { a, b };
}

function normalizeLayout(raw) {
  const edgeMap = new Map();
  (raw?.edges || defaultEdges()).forEach(edge => {
    const normalized = normalizeEdge(edge);
    if (!normalized) return;
    edgeMap.set(edgeKey(normalized), normalized);
  });
  return {
    version: 2,
    zebraLength: clamp(Number(raw?.zebraLength || 5.4), 1.5, 14),
    edges: [...edgeMap.values()],
    zebras: normalizeZebras(raw?.zebras, edgeMap),
    landUse: normalizeLandUse(raw?.landUse)
  };
}

function directionDef(direction) {
  return CROSSWALK_DIRECTIONS.find(item => item.name === direction);
}

function crosswalkKey(crosswalk) {
  return `${crosswalk.col},${crosswalk.row},${crosswalk.direction}`;
}

function edgeMapHasConnection(edgeMap, point, direction) {
  const def = directionDef(direction);
  if (!def) return false;
  const neighbor = { col: point.col + def.dc, row: point.row + def.dr };
  if (neighbor.col < 0 || neighbor.col >= GRID_X.length || neighbor.row < 0 || neighbor.row >= GRID_Z.length) return false;
  const normalized = normalizeEdge({ a: point, b: neighbor });
  return normalized ? edgeMap.has(edgeKey(normalized)) : false;
}

function connectedCrosswalkDirections(point, edgeMap) {
  return CROSSWALK_DIRECTIONS
    .filter(direction => edgeMapHasConnection(edgeMap, point, direction.name))
    .map(direction => direction.name);
}

function normalizeZebras(rawZebras, edgeMap) {
  const source = Array.isArray(rawZebras) ? rawZebras : defaultZebras();
  const zebraMap = new Map();
  source.forEach(zebra => {
    const point = {
      col: clamp(Math.round(zebra.col ?? 0), 0, GRID_X.length - 1),
      row: clamp(Math.round(zebra.row ?? 0), 0, GRID_Z.length - 1)
    };
    const directions = directionDef(zebra.direction)
      ? [zebra.direction]
      : connectedCrosswalkDirections(point, edgeMap);
    directions.forEach(direction => {
      if (!edgeMapHasConnection(edgeMap, point, direction)) return;
      const normalized = { ...point, direction };
      zebraMap.set(crosswalkKey(normalized), normalized);
    });
  });
  return [...zebraMap.values()].sort((a, b) => a.row - b.row || a.col - b.col || a.direction.localeCompare(b.direction));
}

function normalizeLandUse(rawLandUse) {
  const source = Array.isArray(rawLandUse) ? rawLandUse : defaultLandUse();
  const cellMap = new Map();
  source.forEach(cell => {
    const col = clamp(Math.round(cell.col ?? 0), 0, LAND_USE_COLS - 1);
    const row = clamp(Math.round(cell.row ?? 0), 0, LAND_USE_ROWS - 1);
    const type = ["building", "tree", "empty"].includes(cell.type) ? cell.type : "building";
    cellMap.set(`${col},${row}`, { col, row, type });
  });
  defaultLandUse().forEach(cell => {
    const key = `${cell.col},${cell.row}`;
    if (!cellMap.has(key)) cellMap.set(key, cell);
  });
  return [...cellMap.values()].sort((a, b) => a.row - b.row || a.col - b.col);
}

function loadLayout() {
  try {
    return normalizeLayout(JSON.parse(localStorage.getItem(ROAD_LAYOUT_KEY)));
  } catch (error) {
    return normalizeLayout(null);
  }
}

function edgeKey(edge) {
  return `${edge.a.col},${edge.a.row}:${edge.b.col},${edge.b.row}`;
}

function pointKey(point) {
  return `${point.col},${point.row}`;
}

function pointWorld(point) {
  return { x: GRID_X[point.col], z: GRID_Z[point.row] };
}

function setStatus(text) {
  statusEl.textContent = text;
}

function syncControls() {
  lengthInput.value = layout.zebraLength;
  lengthValue.textContent = Number(layout.zebraLength).toFixed(1);
  jsonBox.value = JSON.stringify(layout, null, 2);
}

function draw() {
  svg.innerHTML = "";
  const bg = svgEl("rect", { x: -66, y: -66, width: 132, height: 132, rx: 2, fill: "#cfd9ca" });
  svg.appendChild(bg);
  svg.appendChild(svgEl("rect", {
    class: "green-zone",
    x: GREEN_ZONE.x - GREEN_ZONE.width / 2,
    y: GREEN_ZONE.z - GREEN_ZONE.depth / 2,
    width: GREEN_ZONE.width,
    height: GREEN_ZONE.depth
  }));

  layout.landUse.forEach(cell => {
    const rect = svgEl("rect", {
      class: `land-cell land-${cell.type}`,
      x: LAND_USE_MIN + cell.col * LAND_USE_CELL,
      y: LAND_USE_MIN + cell.row * LAND_USE_CELL,
      width: LAND_USE_CELL,
      height: LAND_USE_CELL
    });
    rect.addEventListener("click", () => handleLandCell(cell));
    svg.appendChild(rect);
  });

  GRID_X.forEach(x => svg.appendChild(svgEl("line", { class: "grid-line", x1: x, y1: GRID_Z[0], x2: x, y2: GRID_Z[GRID_Z.length - 1] })));
  GRID_Z.forEach(z => svg.appendChild(svgEl("line", { class: "grid-line", x1: GRID_X[0], y1: z, x2: GRID_X[GRID_X.length - 1], y2: z })));

  layout.edges.forEach(edge => {
    const a = pointWorld(edge.a);
    const b = pointWorld(edge.b);
    svg.appendChild(svgEl("line", { class: "road", x1: a.x, y1: a.z, x2: b.x, y2: b.z }));
    svg.appendChild(svgEl("line", { class: "lane", x1: a.x, y1: a.z, x2: b.x, y2: b.z }));
  });

  drawCrosswalkApproaches();

  GRID_Z.forEach((_, row) => {
    GRID_X.forEach((_, col) => {
      const selected = selectedPoint && selectedPoint.col === col && selectedPoint.row === row;
      const point = svgEl("circle", { class: `point${selected ? " selected" : ""}`, cx: GRID_X[col], cy: GRID_Z[row], r: 2.8 });
      point.addEventListener("click", () => handlePoint({ col, row }));
      svg.appendChild(point);
    });
  });

  syncControls();
}

function drawLegacyZebra(zebra) {
  const p = pointWorld(zebra);
  const group = svgEl("g", { transform: `translate(${p.x} ${p.z}) rotate(${zebra.rotation})` });
  const hit = svgEl("rect", { class: "zebra-hit", x: -6.2, y: -6.2, width: 12.4, height: 12.4, rx: 1 });
  hit.addEventListener("click", event => {
    event.stopPropagation();
    selectedZebra = pointKey(zebra);
    mode = "zebra";
    updateModeButtons();
    setStatus("Zebra seleccionada. Ajusta su rotación con el control.");
    draw();
  });
  group.appendChild(hit);
  for (let i = -2; i <= 2; i++) {
    group.appendChild(svgEl("rect", {
      class: "zebra-stripe",
      x: -layout.zebraLength / 2,
      y: i * 1.05 - 0.25,
      width: layout.zebraLength,
      height: 0.5
    }));
  }
  svg.appendChild(group);
}

function crosswalkTransform(crosswalk) {
  const def = directionDef(crosswalk.direction);
  const p = pointWorld(crosswalk);
  return {
    x: p.x + (def?.dc || 0) * CROSSWALK_OFFSET,
    z: p.z + (def?.dr || 0) * CROSSWALK_OFFSET,
    rotation: crosswalk.direction === "east" || crosswalk.direction === "west" ? 90 : 0
  };
}

function crosswalkApproaches() {
  const edgeMap = new Map(layout.edges.map(edge => [edgeKey(edge), edge]));
  const approaches = [];
  layout.edges.forEach(edge => {
    [edge.a, edge.b].forEach(point => {
      connectedCrosswalkDirections(point, edgeMap).forEach(direction => approaches.push({ ...point, direction }));
    });
  });
  const unique = new Map();
  approaches.forEach(approach => unique.set(crosswalkKey(approach), approach));
  return [...unique.values()].sort((a, b) => a.row - b.row || a.col - b.col || a.direction.localeCompare(b.direction));
}

function drawCrosswalkApproaches() {
  const active = new Set(layout.zebras.map(crosswalkKey));
  crosswalkApproaches().forEach(approach => drawZebra(approach, active.has(crosswalkKey(approach))));
}

function drawZebra(zebra, active) {
  const transform = crosswalkTransform(zebra);
  const safeLength = Math.min(layout.zebraLength, ROAD_WIDTH - 0.6);
  const stripeLength = safeLength / 2;
  const stripeSpan = 4 * 1.05 + 0.5;
  const group = svgEl("g", { transform: `translate(${transform.x} ${transform.z}) rotate(${transform.rotation})` });
  const selected = selectedZebra === crosswalkKey(zebra);
  const hit = svgEl("rect", {
    class: active ? `zebra-hit${selected ? " selected" : ""}` : "zebra-slot",
    x: -stripeSpan / 2 - 0.4,
    y: -stripeLength / 2 - 0.4,
    width: stripeSpan + 0.8,
    height: stripeLength + 0.8,
    rx: 0.8
  });
  hit.addEventListener("click", event => {
    event.stopPropagation();
    toggleZebra(zebra);
  });
  group.appendChild(hit);
  if (active) {
    for (let i = -2; i <= 2; i++) {
      group.appendChild(svgEl("rect", {
        class: "zebra-stripe",
        x: i * 1.05 - 0.25,
        y: -stripeLength / 2,
        width: 0.5,
        height: stripeLength
      }));
    }
  }
  svg.appendChild(group);
}

function svgEl(name, attrs) {
  const element = document.createElementNS("http://www.w3.org/2000/svg", name);
  Object.entries(attrs).forEach(([key, value]) => element.setAttribute(key, value));
  return element;
}

function handleLegacyPoint(point) {
  if (mode === "land") return;
  if (mode === "zebra") {
    const key = pointKey(point);
    const index = layout.zebras.findIndex(zebra => pointKey(zebra) === key);
    if (index >= 0 && selectedZebra === key) {
      layout.zebras.splice(index, 1);
      selectedZebra = null;
      setStatus("Zebra eliminada.");
    } else if (index >= 0) {
      selectedZebra = key;
      setStatus("Zebra seleccionada. Ajusta su rotación.");
    } else {
      layout.zebras.push({ ...point, direction: "east" });
      selectedZebra = key;
      setStatus("Zebra agregada.");
    }
    draw();
    return;
  }

  if (!selectedPoint) {
    selectedPoint = point;
    setStatus("Selecciona otro punto de la misma fila o columna.");
    draw();
    return;
  }

  const edge = normalizeEdge({ a: selectedPoint, b: point });
  selectedPoint = null;
  if (!edge) {
    setStatus("La calle debe unir dos puntos distintos en línea recta.");
    draw();
    return;
  }
  const key = edgeKey(edge);
  const index = layout.edges.findIndex(item => edgeKey(item) === key);
  if (index >= 0) {
    layout.edges.splice(index, 1);
    setStatus("Calle eliminada.");
  } else {
    layout.edges.push(edge);
    setStatus("Calle agregada.");
  }
  draw();
}

function handlePoint(point) {
  if (mode === "land") return;
  if (mode === "zebra") {
    setStatus("Haz clic en una aproximaciÃ³n de calle para agregar o quitar una zebra.");
    return;
  }

  if (!selectedPoint) {
    selectedPoint = point;
    setStatus("Selecciona otro punto de la misma fila o columna.");
    draw();
    return;
  }

  const edge = normalizeEdge({ a: selectedPoint, b: point });
  selectedPoint = null;
  if (!edge) {
    setStatus("La calle debe unir dos puntos distintos en lÃ­nea recta.");
    draw();
    return;
  }
  const key = edgeKey(edge);
  const index = layout.edges.findIndex(item => edgeKey(item) === key);
  if (index >= 0) {
    layout.edges.splice(index, 1);
    layout = normalizeLayout(layout);
    setStatus("Calle eliminada.");
  } else {
    layout.edges.push(edge);
    layout = normalizeLayout(layout);
    setStatus("Calle agregada.");
  }
  draw();
}

function toggleZebra(zebra) {
  mode = "zebra";
  const key = crosswalkKey(zebra);
  const index = layout.zebras.findIndex(item => crosswalkKey(item) === key);
  if (index >= 0) {
    layout.zebras.splice(index, 1);
    selectedZebra = null;
    setStatus("Zebra eliminada.");
  } else {
    layout.zebras.push({ col: zebra.col, row: zebra.row, direction: zebra.direction });
    selectedZebra = key;
    setStatus("Zebra agregada antes de la intersecciÃ³n.");
  }
  layout = normalizeLayout(layout);
  updateModeButtons();
  draw();
}

function handleLandCell(cell) {
  if (mode !== "land") return;
  const target = layout.landUse.find(item => item.col === cell.col && item.row === cell.row);
  if (target) target.type = landBrush;
  setStatus(`Celda marcada como ${landBrush === "building" ? "edificio" : landBrush === "tree" ? "árboles" : "vacía"}.`);
  draw();
}

function cellFromSvgEvent(event) {
  const point = svg.createSVGPoint();
  point.x = event.clientX;
  point.y = event.clientY;
  const local = point.matrixTransform(svg.getScreenCTM().inverse());
  const col = Math.floor((local.x - LAND_USE_MIN) / LAND_USE_CELL);
  const row = Math.floor((local.y - LAND_USE_MIN) / LAND_USE_CELL);
  if (col < 0 || col >= LAND_USE_COLS || row < 0 || row >= LAND_USE_ROWS) return null;
  return layout.landUse.find(cell => cell.col === col && cell.row === row);
}

function updateModeButtons() {
  document.getElementById("mode-road").classList.toggle("active", mode === "road");
  document.getElementById("mode-zebra").classList.toggle("active", mode === "zebra");
  document.getElementById("mode-land").classList.toggle("active", mode === "land");
  document.getElementById("land-building").classList.toggle("active", landBrush === "building");
  document.getElementById("land-tree").classList.toggle("active", landBrush === "tree");
  document.getElementById("land-empty").classList.toggle("active", landBrush === "empty");
}

document.getElementById("mode-road").addEventListener("click", () => {
  mode = "road";
  selectedPoint = null;
  updateModeButtons();
  setStatus("Selecciona dos puntos alineados para crear o quitar una calle.");
  draw();
});

document.getElementById("mode-zebra").addEventListener("click", () => {
  mode = "zebra";
  selectedPoint = null;
  updateModeButtons();
  setStatus("Haz clic en una aproximaciÃ³n de calle para agregar o quitar una zebra.");
  draw();
});

document.getElementById("mode-land").addEventListener("click", () => {
  mode = "land";
  selectedPoint = null;
  selectedZebra = null;
  updateModeButtons();
  setStatus("Selecciona celdas para definir dónde van edificios, árboles o espacios vacíos.");
  draw();
});

document.getElementById("land-building").addEventListener("click", () => {
  landBrush = "building";
  mode = "land";
  updateModeButtons();
  setStatus("Pincel: edificios.");
});

document.getElementById("land-tree").addEventListener("click", () => {
  landBrush = "tree";
  mode = "land";
  updateModeButtons();
  setStatus("Pincel: árboles.");
});

document.getElementById("land-empty").addEventListener("click", () => {
  landBrush = "empty";
  mode = "land";
  updateModeButtons();
  setStatus("Pincel: vacío.");
});

svg.addEventListener("click", event => {
  if (mode !== "land") return;
  const cell = cellFromSvgEvent(event);
  if (cell) handleLandCell(cell);
});

lengthInput.addEventListener("input", () => {
  layout.zebraLength = Number(lengthInput.value);
  draw();
});

document.getElementById("btn-save").addEventListener("click", () => {
  localStorage.setItem(ROAD_LAYOUT_KEY, JSON.stringify(layout));
  setStatus("Diseño guardado. Recarga la simulación para verlo aplicado.");
});

document.getElementById("btn-export").addEventListener("click", () => {
  jsonBox.value = JSON.stringify(layout, null, 2);
  jsonBox.select();
  setStatus("JSON listo para copiar.");
});

document.getElementById("btn-import").addEventListener("click", () => {
  try {
    layout = normalizeLayout(JSON.parse(jsonBox.value));
    selectedPoint = null;
    selectedZebra = null;
    setStatus("Layout importado en el editor. Guarda para aplicarlo en la simulación.");
    draw();
  } catch (error) {
    setStatus("No se pudo importar: JSON inválido.");
  }
});

document.getElementById("file-import").addEventListener("change", async event => {
  const file = event.target.files[0];
  if (!file) return;
  jsonBox.value = await file.text();
  document.getElementById("btn-import").click();
});

document.getElementById("btn-default").addEventListener("click", () => {
  layout = normalizeLayout(null);
  selectedPoint = null;
  selectedZebra = null;
  setStatus("Grilla completa restaurada en el editor. Guarda para aplicarla.");
  draw();
});

document.getElementById("btn-clear").addEventListener("click", () => {
  layout = normalizeLayout({ edges: [], zebras: [], zebraLength: layout.zebraLength, landUse: layout.landUse });
  selectedPoint = null;
  selectedZebra = null;
  setStatus("Calles y zebras eliminadas en el editor. Guarda para aplicarlo.");
  draw();
});

draw();
</script>
</body>
</html>
