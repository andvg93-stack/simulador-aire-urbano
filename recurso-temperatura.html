<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Temperatura urbana</title>
<style>body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f8f1ec;color:#17202a}main{max-width:900px;margin:auto;padding:28px}.panel{background:#fff;border:1px solid #e3d1c8;border-radius:8px;padding:18px}.surface{height:230px;border-radius:8px;display:grid;grid-template-columns:1fr 1fr;overflow:hidden}.asphalt,.park{display:grid;place-items:center;font-size:28px;font-weight:800}.asphalt{background:#242424;color:#fff}.park{background:#5fbf72;color:#103a23}input{width:100%}</style></head>
<body><main><h1>Temperatura</h1><p>La isla de calor urbana aumenta la temperatura cuando predominan asfalto, techos duros y poca vegetación.</p><section class="panel"><label><strong>Cobertura verde</strong></label><input id="green" type="range" min="0" max="100" value="35"><p>Temperatura estimada: <strong id="temp">25.7</strong> °C</p><div class="surface"><div id="asphalt" class="asphalt">Asfalto</div><div id="park" class="park">Verde</div></div></section></main><script>
const green=document.getElementById("green"),temp=document.getElementById("temp"),asphalt=document.getElementById("asphalt"),park=document.getElementById("park");function render(){const g=Number(green.value);temp.textContent=(29-g*.07).toFixed(1);asphalt.style.flex=`${100-g}`;park.style.opacity=.35+g/155;park.textContent=`${g}% verde`}green.addEventListener("input",render);render();
</script></body></html>
