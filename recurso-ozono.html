<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Ozono troposférico</title>
<style>body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f7f3e8;color:#17202a}main{max-width:920px;margin:auto;padding:28px}.panel{background:#fff;border:1px solid #ded6c4;border-radius:8px;padding:18px}.formula{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-items:center;text-align:center}.box{padding:18px;border-radius:8px;background:#eef3f4;font-weight:800}.sun{background:#f4d35e}.bad{background:#f7c5bf}input{width:100%}@media(max-width:760px){.formula{grid-template-columns:1fr}}</style></head>
<body><main><h1>O₃</h1><p>El ozono a nivel del suelo no sale directamente de un tubo de escape: se forma con luz solar, NOx y COV.</p><section class="panel"><div class="formula"><div class="box">NOx</div><div>+</div><div class="box">COV</div><div class="box sun">Sol</div><div id="ozone" class="box bad">O₃ medio</div></div><p><label><strong>Radiación solar y calor</strong></label><input id="sun" type="range" min="0" max="100" value="55"></p><p>Cuando se reduce NOx sin controlar COV, el ozono puede no bajar como se espera.</p></section></main><script>
const sun=document.getElementById("sun"),ozone=document.getElementById("ozone");function render(){const v=Number(sun.value);ozone.textContent=v<35?"O₃ bajo":v<70?"O₃ medio":"O₃ alto";ozone.style.transform=`scale(${1+v/260})`;ozone.style.background=v<35?"#dff1e8":v<70?"#fff3d9":"#f7c5bf"}sun.addEventListener("input",render);render();
</script><script src="recurso-volver.js"></script></body></html>
