<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>NOx</title>
<style>body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f3f5f7;color:#17202a}main{max-width:900px;margin:auto;padding:28px;display:grid;gap:18px}.panel{background:#fff;border:1px solid #d7dee2;border-radius:8px;padding:18px}.road{height:230px;background:#111;border-radius:8px;position:relative;overflow:hidden}.lane{position:absolute;left:0;right:0;top:50%;height:3px;background:#f4d35e}.car{position:absolute;bottom:42px;width:58px;height:28px;border-radius:5px;background:#be3a34}.plume{position:absolute;bottom:70px;border-radius:50%;background:rgba(37,99,168,.28)}input{width:100%}h1{margin:0;font-size:34px}</style>
</head><body><main><header><h1>NOx</h1><p>Los óxidos de nitrógeno suelen venir de motores y combustión. También participan en la formación de ozono troposférico.</p></header><section class="panel"><label for="diesel"><strong>Vehículos de combustión</strong></label><input id="diesel" type="range" min="0" max="100" value="70"><p>NOx estimado: <strong id="ppb">94</strong> ppb</p><div id="road" class="road"><div class="lane"></div></div></section></main><script>
const diesel=document.getElementById("diesel"),ppb=document.getElementById("ppb"),road=document.getElementById("road");function render(){const v=Number(diesel.value);ppb.textContent=Math.round(15+v*1.1);road.querySelectorAll(".car,.plume").forEach(e=>e.remove());for(let i=0;i<2+v/14;i++){const c=document.createElement("div");c.className="car";c.style.left=`${i*82%820}px`;road.appendChild(c);const p=document.createElement("div");p.className="plume";const s=18+v/5;p.style.width=p.style.height=`${s}px`;p.style.left=`${(i*82+46)%820}px`;road.appendChild(p)}}diesel.addEventListener("input",render);render();
</script><script src="recurso-volver.js"></script></body></html>
