<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Población expuesta</title>
<style>body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f1f5ef;color:#17202a}main{max-width:900px;margin:auto;padding:28px}.panel{background:#fff;border:1px solid #d7dee2;border-radius:8px;padding:18px}.map{height:260px;border-radius:8px;background:#dfe9dc;position:relative;overflow:hidden}.road{position:absolute;background:#111}.person{position:absolute;width:16px;height:16px;border-radius:50%;background:#1b8a5a}.risk{background:#be3a34}input{width:100%}</style></head>
<body><main><h1>Población expuesta</h1><p>Este indicador estima cuántas personas permanecen en zonas con concentraciones altas o por tiempos prolongados.</p><section class="panel"><label><strong>Distancia de viviendas a vías contaminadas</strong></label><input id="near" type="range" min="0" max="100" value="70"><p>Población expuesta estimada: <strong id="people">78000</strong> habitantes</p><div id="map" class="map"><div class="road" style="left:0;right:0;top:122px;height:22px"></div><div class="road" style="top:0;bottom:0;left:420px;width:22px"></div></div></section></main><script>
const near=document.getElementById("near"),people=document.getElementById("people"),map=document.getElementById("map");function render(){const v=Number(near.value);people.textContent=Math.round(30000+v*680).toLocaleString("es-CO");map.querySelectorAll(".person").forEach(p=>p.remove());for(let i=0;i<42;i++){const p=document.createElement("div");p.className="person";const close=Math.random()*100<v;p.classList.toggle("risk",close);p.style.left=close?`${360+Math.random()*120}px`:`${Math.random()*85}%`;p.style.top=close?`${90+Math.random()*85}px`:`${Math.random()*88}%`;map.appendChild(p)}}near.addEventListener("input",render);render();
</script><script src="recurso-volver.js"></script></body></html>
