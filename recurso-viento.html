<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Velocidad del viento</title>
<style>body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#edf7f8;color:#17202a}main{max-width:900px;margin:auto;padding:28px}.panel{background:#fff;border:1px solid #cde0e3;border-radius:8px;padding:18px}.air{height:230px;border-radius:8px;background:#dff4f7;position:relative;overflow:hidden}.arrow{position:absolute;height:8px;background:#047a7a;border-radius:999px}.arrow:after{content:"";position:absolute;right:-14px;top:-6px;border-left:16px solid #047a7a;border-top:10px solid transparent;border-bottom:10px solid transparent}input{width:100%}</style></head>
<body><main><h1>Velocidad del viento</h1><p>Más viento suele mejorar la dispersión, aunque no reemplaza la reducción de emisiones.</p><section class="panel"><label><strong>Viento</strong></label><input id="wind" type="range" min="0" max="100" value="25"><p>Velocidad estimada: <strong id="speed">1.5</strong> m/s</p><div id="air" class="air"></div></section></main><script>
const wind=document.getElementById("wind"),speed=document.getElementById("speed"),air=document.getElementById("air");function render(){const v=Number(wind.value);speed.textContent=(.5+v*.05).toFixed(1);air.innerHTML="";for(let i=0;i<3+v/12;i++){const a=document.createElement("div");a.className="arrow";a.style.width=`${35+v}px`;a.style.left=`${Math.random()*60}%`;a.style.top=`${20+Math.random()*170}px`;a.style.opacity=.35+v/160;air.appendChild(a)}}wind.addEventListener("input",render);render();
</script><script src="recurso-volver.js"></script></body></html>
