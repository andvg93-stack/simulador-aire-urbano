<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>COV</title>
<style>body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f4eef7;color:#17202a}main{max-width:900px;margin:auto;padding:28px}.panel{background:#fff;border:1px solid #ddcde6;border-radius:8px;padding:18px}.shop{height:250px;border-radius:8px;background:#efe7f4;position:relative;overflow:hidden}.can{position:absolute;bottom:22px;width:64px;height:78px;border-radius:7px;background:#7c4d9e}.vapor{position:absolute;border-radius:50%;background:rgba(124,77,158,.28)}input{width:100%}</style></head>
<body><main><h1>COV</h1><p>Los compuestos orgánicos volátiles pueden venir de solventes, pinturas, combustibles, talleres e industria liviana.</p><section class="panel"><label><strong>Uso de solventes sin control</strong></label><input id="solvent" type="range" min="0" max="100" value="65"><p>COV estimado: <strong id="value">34</strong> µg/m³</p><div id="shop" class="shop"><div class="can" style="left:90px"></div><div class="can" style="left:210px;background:#9b6bb8"></div><div class="can" style="left:340px;background:#674084"></div></div></section></main><script>
const solvent=document.getElementById("solvent"),value=document.getElementById("value"),shop=document.getElementById("shop");function render(){const v=Number(solvent.value);value.textContent=(5+v*.65).toFixed(1);shop.querySelectorAll(".vapor").forEach(e=>e.remove());for(let i=0;i<v/7;i++){const e=document.createElement("div");e.className="vapor";const s=28+Math.random()*44;e.style.width=e.style.height=`${s}px`;e.style.left=`${80+Math.random()*330}px`;e.style.top=`${20+Math.random()*120}px`;shop.appendChild(e)}}solvent.addEventListener("input",render);render();
</script><script src="recurso-volver.js"></script></body></html>
